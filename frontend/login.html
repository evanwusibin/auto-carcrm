<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>售后知识管理平台 — 登录</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary:       #1a56db;
  --primary-dark:  #1341b0;
  --primary-light: #e8effd;
  --accent:        #0ea5e9;
  --text-main:     #1e293b;
  --text-sub:      #64748b;
  --text-light:    #94a3b8;
  --border:        #e2e8f0;
  --bg-main:       #f1f5f9;
  --bg-white:      #ffffff;
  --success:       #16a34a;
  --error:         #dc2626;
  --warn:          #d97706;
  --radius:        8px;
  --radius-lg:     12px;
  --shadow-card:   0 8px 40px rgba(26,86,219,.13);
  --shadow-sm:     0 2px 8px rgba(0,0,0,.06);
  --transition:    .2s cubic-bezier(.4,0,.2,1);
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
  font-size: 14px;
  color: var(--text-main);
  overflow: hidden;
}

/* ─── BACKGROUND ─── */
.bg-wrap {
  position: fixed; inset: 0; z-index: 0;
  background: #c7d9f5;
}
.bg-img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 45%;
  display: block;
  opacity: 1;
  transition: opacity .6s;
}
/* Subtle blue-tinted overlay so left panel text stays readable */
.bg-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    105deg,
    rgba(15,40,100,.55) 0%,
    rgba(15,40,100,.30) 45%,
    rgba(15,40,100,.08) 100%
  );
}

/* ─── LAYOUT ─── */
.page {
  position: relative; z-index: 1;
  height: 100vh;
  display: flex;
  align-items: stretch;
}

/* ─── LEFT INFO PANEL ─── */
.brand-panel {
  flex: 1 1 0;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 52px 56px 44px;
  min-width: 0;
}
.brand-top { display: flex; flex-direction: column; gap: 0; }

.brand-logo {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 64px;
}
.brand-logo-mark {
  width: 40px; height: 40px;
  background: var(--primary);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(26,86,219,.35);
}
.brand-logo-mark svg { width: 22px; height: 22px; stroke: #fff; fill: none; stroke-width: 2; }
.brand-logo-text {
  color: #fff;
  font-size: 16px; font-weight: 600;
  letter-spacing: .01em;
  text-shadow: 0 1px 4px rgba(0,0,0,.25);
}
.brand-logo-sub {
  color: rgba(255,255,255,.65);
  font-size: 11.5px; margin-top: 2px;
}

.brand-headline {
  color: #fff;
  font-size: clamp(26px, 3vw, 42px);
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -.01em;
  margin-bottom: 20px;
  text-shadow: 0 2px 12px rgba(0,0,0,.3);
}
.brand-headline em {
  font-style: normal;
  color: #93c5fd;
}
.brand-desc {
  color: rgba(255,255,255,.75);
  font-size: 14.5px;
  line-height: 1.75;
  max-width: 400px;
  text-shadow: 0 1px 4px rgba(0,0,0,.2);
}

.brand-pills {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-top: 36px;
}
.pill {
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 12.5px; font-weight: 500;
  background: rgba(255,255,255,.15);
  color: rgba(255,255,255,.9);
  border: 1px solid rgba(255,255,255,.25);
  backdrop-filter: blur(4px);
}

.brand-stats {
  display: flex; gap: 36px;
  margin-top: 44px;
}
.stat-item {}
.stat-num {
  color: #fff;
  font-size: 26px; font-weight: 700;
  letter-spacing: -.02em;
  text-shadow: 0 1px 6px rgba(0,0,0,.2);
}
.stat-num span { font-size: 13px; font-weight: 400; margin-left: 2px; color: rgba(255,255,255,.6); }
.stat-label { color: rgba(255,255,255,.55); font-size: 11.5px; margin-top: 3px; }

.brand-footer {
  color: rgba(255,255,255,.35);
  font-size: 11.5px;
}

/* ─── RIGHT LOGIN PANEL ─── */
.login-side {
  width: 448px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(24px) saturate(1.5);
  -webkit-backdrop-filter: blur(24px) saturate(1.5);
  border-left: 1px solid rgba(226,232,240,.8);
  box-shadow: -8px 0 40px rgba(26,86,219,.08);
}

.login-card {
  width: 100%;
  max-width: 372px;
}

/* ─── CARD HEADER ─── */
.card-header { margin-bottom: 28px; }
.card-icon {
  width: 44px; height: 44px;
  background: var(--primary-light);
  border-radius: var(--radius-lg);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
}
.card-icon svg { width: 22px; height: 22px; stroke: var(--primary); fill: none; stroke-width: 2; }
.card-title {
  color: var(--text-main);
  font-size: 22px; font-weight: 700;
  margin-bottom: 5px;
}
.card-sub { color: var(--text-sub); font-size: 13px; }

/* ─── TABS ─── */
.tab-bar {
  display: flex;
  background: var(--bg-main);
  border-radius: var(--radius);
  padding: 3px;
  margin-bottom: 24px;
  gap: 2px;
}
.tab-btn {
  flex: 1;
  padding: 8px 0;
  border: none;
  background: transparent;
  color: var(--text-sub);
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  border-radius: 6px;
  transition: var(--transition);
  font-family: inherit;
}
.tab-btn.active {
  background: var(--bg-white);
  color: var(--primary);
  font-weight: 600;
  box-shadow: var(--shadow-sm);
}
.tab-btn:hover:not(.active) { color: var(--text-main); }

/* ─── PANELS ─── */
.panel { display: none; }
.panel.active { display: block; }

/* ─── FORM ELEMENTS ─── */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  color: var(--text-sub);
  font-size: 12px; font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.input-wrap { position: relative; }
.input-wrap .input-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-light);
  display: flex; align-items: center;
  pointer-events: none;
}
.input-wrap .input-icon svg { width: 15px; height: 15px; }
.form-input {
  width: 100%;
  height: 44px;
  padding: 0 12px 0 38px;
  background: var(--bg-white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-main);
  font-size: 14px;
  outline: none;
  transition: var(--transition);
  font-family: inherit;
}
.form-input::placeholder { color: var(--text-light); }
.form-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(26,86,219,.1);
}
.form-input.error { border-color: var(--error); }

.input-action {
  position: absolute; right: 0; top: 0; bottom: 0;
  display: flex; align-items: center;
}
.toggle-pw {
  background: none; border: none; cursor: pointer;
  color: var(--text-light);
  padding: 0 12px;
  display: flex; align-items: center;
  transition: var(--transition);
}
.toggle-pw:hover { color: var(--text-sub); }
.toggle-pw svg { width: 15px; height: 15px; }

.code-btn {
  background: none; border: none; cursor: pointer;
  color: var(--primary); font-weight: 600;
  padding: 0 12px;
  font-size: 12.5px;
  border-left: 1.5px solid var(--border);
  height: 30px;
  white-space: nowrap;
  transition: var(--transition);
  font-family: inherit;
}
.code-btn:hover { color: var(--primary-dark); }
.code-btn:disabled { color: var(--text-light); cursor: not-allowed; }

.input-wrap.no-icon .form-input { padding-left: 12px; }

.form-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.remember-wrap {
  display: flex; align-items: center; gap: 7px; cursor: pointer;
}
.remember-wrap input[type=checkbox] {
  width: 15px; height: 15px; accent-color: var(--primary); cursor: pointer;
}
.remember-wrap span { color: var(--text-sub); font-size: 13px; }
.forgot-link {
  color: var(--primary); font-size: 13px;
  text-decoration: none;
  transition: var(--transition);
}
.forgot-link:hover { color: var(--primary-dark); text-decoration: underline; }

/* ─── SUBMIT BTN ─── */
.btn-submit {
  width: 100%; height: 46px;
  background: var(--primary);
  border: none; border-radius: var(--radius);
  color: #fff; font-size: 15px; font-weight: 600;
  cursor: pointer; letter-spacing: .04em;
  position: relative; overflow: hidden;
  transition: var(--transition);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-family: inherit;
  box-shadow: 0 4px 14px rgba(26,86,219,.3);
}
.btn-submit:hover:not(:disabled) {
  background: var(--primary-dark);
  box-shadow: 0 6px 18px rgba(26,86,219,.35);
}
.btn-submit:active:not(:disabled) { transform: scale(.99); }
.btn-submit:disabled { opacity: .6; cursor: not-allowed; box-shadow: none; }
.btn-submit .spinner {
  display: none;
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
.btn-submit.loading .btn-text { opacity: 0; }
.btn-submit.loading .spinner { display: block; position: absolute; }

/* ─── DIVIDER ─── */
.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 18px 0;
}
.divider::before, .divider::after {
  content: ''; flex: 1;
  height: 1px; background: var(--border);
}
.divider span { color: var(--text-light); font-size: 12px; white-space: nowrap; }

/* ─── SSO BTN ─── */
.btn-sso {
  width: 100%; height: 42px;
  background: var(--bg-white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-sub); font-size: 13px; font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: var(--transition);
  font-family: inherit;
}
.btn-sso:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-light);
}
.btn-sso svg { width: 15px; height: 15px; flex-shrink: 0; }

/* ─── FIELD ERROR ─── */
.field-err {
  display: none;
  color: var(--error); font-size: 12px; margin-top: 5px;
  display: flex; align-items: center; gap: 4px;
}
.field-err.show { display: flex; }
.field-err::before { content: '!'; width: 14px; height: 14px; border-radius: 50%; background: #fee2e2; color: var(--error); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* ─── TOAST ─── */
.toast-wrap {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
  z-index: 9999;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  pointer-events: none;
}
.toast {
  padding: 10px 20px;
  border-radius: var(--radius);
  font-size: 13px; font-weight: 500;
  color: #fff;
  pointer-events: all;
  opacity: 0; transform: translateY(10px);
  transition: opacity .25s, transform .25s;
  white-space: nowrap;
  min-width: 180px; text-align: center;
  box-shadow: 0 4px 16px rgba(0,0,0,.15);
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.info    { background: var(--primary); }
.toast.error   { background: var(--error); }
.toast.success { background: var(--success); }

@keyframes spin { to { transform: rotate(360deg); } }

/* ─── RESPONSIVE ─── */
@media (max-width: 860px) {
  .brand-panel { display: none; }
  .login-side {
    width: 100%;
    background: rgba(255,255,255,.96);
    border-left: none;
    box-shadow: none;
  }
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg-wrap">
  <img class="bg-img" id="bgImg"
    src="images/snow_bg.webp"
    onerror="this.style.display='none'"
    alt="">
  <div class="bg-overlay"></div>
</div>

<div class="page">
  <!-- Left info panel -->
  <div class="brand-panel">
    <div class="brand-top">
      <div class="brand-logo">
        <div class="brand-logo-mark">
          <!-- truck / van icon -->
          <svg viewBox="0 0 24 24">
            <rect x="1" y="8" width="15" height="11" rx="1"/>
            <path d="M16 8l3 3v8h-3V8z"/>
            <circle cx="5.5" cy="19" r="1.5"/>
            <circle cx="18.5" cy="19" r="1.5"/>
          </svg>
        </div>
        <div>
          <div class="brand-logo-text">商用车售后知识平台</div>
          <div class="brand-logo-sub">After-Sales Knowledge Platform</div>
        </div>
      </div>

      <div class="brand-headline">
        售后知识<br>
        管理平台
        <br><em>智能检索 · 精准响应</em>
      </div>
      <div class="brand-desc">
        整合保养手册、质保规则、维修手册与典型案例，<br>
        为服务顾问、维修技师及售后工程师提供<br>
        一站式知识检索与诊断辅助服务。
      </div>

      <div class="brand-pills">
        <span class="pill">📄 保养手册</span>
        <span class="pill">🛡 质保规则</span>
        <span class="pill">🔧 维修手册</span>
        <span class="pill">💡 典型案例</span>
      </div>

      <div class="brand-stats">
        <div class="stat-item">
          <div class="stat-num">12<span>+</span></div>
          <div class="stat-label">知识文档类型</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">3<span>端</span></div>
          <div class="stat-label">厂家 / 经销商 / 客户</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">4<span>路</span></div>
          <div class="stat-label">混合检索策略</div>
        </div>
      </div>
    </div>

    <div class="brand-footer">
      &copy; 2026 商用车售后知识管理平台 &nbsp;·&nbsp; 保留所有权利
    </div>
  </div>

  <!-- Right login panel -->
  <div class="login-side">
    <div class="login-card">
      <div class="card-header">
        <div class="card-icon">
          <svg viewBox="0 0 24 24">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
        </div>
        <div class="card-title">账号登录</div>
        <div class="card-sub">请使用企业账号或手机号登录系统</div>
      </div>

      <!-- Tab bar -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="pwd">密码登录</button>
        <button class="tab-btn" data-tab="sms">验证码登录</button>
      </div>

      <!-- Password panel -->
      <div class="panel active" id="panel-pwd">
        <div class="form-group">
          <label class="form-label">工号 / 账号</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input class="form-input" id="pwd-account" type="text"
              placeholder="请输入工号或账号" autocomplete="username" maxlength="64">
          </div>
          <div class="field-err" id="err-account">请输入账号</div>
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input class="form-input" id="pwd-password" type="password"
              placeholder="请输入密码" autocomplete="current-password" maxlength="64">
            <div class="input-action">
              <button class="toggle-pw" id="pwToggle" type="button" title="显示/隐藏密码">
                <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="field-err" id="err-password">请输入密码</div>
        </div>

        <div class="form-row">
          <label class="remember-wrap">
            <input type="checkbox" id="rememberMe">
            <span>记住账号</span>
          </label>
          <a class="forgot-link" href="#" onclick="showToast('请联系系统管理员重置密码','info');return false;">忘记密码？</a>
        </div>

        <button class="btn-submit" id="btn-pwd-login">
          <span class="btn-text">登 录</span>
          <span class="spinner"></span>
        </button>
      </div>

      <!-- SMS panel -->
      <div class="panel" id="panel-sms">
        <div class="form-group">
          <label class="form-label">手机号</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.29 2 2 0 0 1 3.58 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
            </span>
            <input class="form-input" id="sms-phone" type="tel"
              placeholder="请输入手机号" maxlength="11">
          </div>
          <div class="field-err" id="err-phone">请输入有效的手机号</div>
        </div>

        <div class="form-group">
          <label class="form-label">验证码</label>
          <div class="input-wrap no-icon">
            <input class="form-input" id="sms-code" type="text"
              placeholder="请输入验证码" maxlength="6">
            <div class="input-action">
              <button class="code-btn" id="btn-send-code" type="button">获取验证码</button>
            </div>
          </div>
          <div class="field-err" id="err-code">请输入验证码</div>
        </div>

        <div style="margin-bottom:20px"></div>

        <button class="btn-submit" id="btn-sms-login">
          <span class="btn-text">登 录</span>
          <span class="spinner"></span>
        </button>
      </div>

      <!-- SSO -->
      <div class="divider"><span>或使用企业单点登录</span></div>
      <button class="btn-sso" id="btn-sso">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
          <path d="M8 21h8m-4-4v4"/>
        </svg>
        企业 SSO 单点登录
      </button>

    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
(function () {
  // ─── Tab switching ───
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    });
  });

  // ─── Password toggle ───
  const pwInput = document.getElementById('pwd-password');
  const eyeIcon = document.getElementById('eye-icon');
  document.getElementById('pwToggle').addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  });

  // ─── Remember account ───
  const accountInput = document.getElementById('pwd-account');
  const savedAcc = localStorage.getItem('crm_account');
  if (savedAcc) {
    accountInput.value = savedAcc;
    document.getElementById('rememberMe').checked = true;
  }

  // ─── Toast ───
  function showToast(msg, type = 'info', duration = 3000) {
    const wrap = document.getElementById('toastWrap');
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    wrap.appendChild(t);
    requestAnimationFrame(() => { requestAnimationFrame(() => t.classList.add('show')); });
    setTimeout(() => {
      t.classList.remove('show');
      setTimeout(() => t.remove(), 300);
    }, duration);
  }
  window.showToast = showToast;

  // ─── Field error helpers ───
  function setErr(id, show) {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('show', show);
  }
  function clearErrs() {
    document.querySelectorAll('.field-err').forEach(e => e.classList.remove('show'));
    document.querySelectorAll('.form-input').forEach(e => e.classList.remove('error'));
  }

  // ─── Password login ───
  function handlePwdLogin() {
    clearErrs();
    const account = accountInput.value.trim();
    const password = pwInput.value.trim();
    let ok = true;
    if (!account) { setErr('err-account', true); accountInput.classList.add('error'); ok = false; }
    if (!password) { setErr('err-password', true); pwInput.classList.add('error'); ok = false; }
    if (!ok) return;
    if (document.getElementById('rememberMe').checked) {
      localStorage.setItem('crm_account', account);
    } else {
      localStorage.removeItem('crm_account');
    }
    const btn = document.getElementById('btn-pwd-login');
    btn.classList.add('loading'); btn.disabled = true;
    setTimeout(() => {
      btn.classList.remove('loading'); btn.disabled = false;
      showToast('登录成功，正在跳转...', 'success');
      setTimeout(() => { window.location.href = 'import.html'; }, 800);
    }, 1000);
  }
  document.getElementById('btn-pwd-login').addEventListener('click', handlePwdLogin);
  pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') handlePwdLogin(); });
  accountInput.addEventListener('keydown', e => { if (e.key === 'Enter') handlePwdLogin(); });

  // ─── SMS code countdown ───
  let codeTimer = null;
  document.getElementById('btn-send-code').addEventListener('click', () => {
    const phone = document.getElementById('sms-phone').value.trim();
    if (!/^1[3-9]\d{9}$/.test(phone)) {
      setErr('err-phone', true);
      document.getElementById('sms-phone').classList.add('error');
      return;
    }
    setErr('err-phone', false);
    document.getElementById('sms-phone').classList.remove('error');
    const btn = document.getElementById('btn-send-code');
    let sec = 60;
    btn.disabled = true; btn.textContent = sec + 's后重发';
    showToast('验证码已发送至手机', 'success');
    codeTimer = setInterval(() => {
      sec--;
      btn.textContent = sec + 's后重发';
      if (sec <= 0) {
        clearInterval(codeTimer); btn.disabled = false; btn.textContent = '获取验证码';
      }
    }, 1000);
  });

  // ─── SMS login ───
  function handleSmsLogin() {
    clearErrs();
    const phone = document.getElementById('sms-phone').value.trim();
    const code  = document.getElementById('sms-code').value.trim();
    let ok = true;
    if (!/^1[3-9]\d{9}$/.test(phone)) {
      setErr('err-phone', true);
      document.getElementById('sms-phone').classList.add('error'); ok = false;
    }
    if (code.length < 4) {
      setErr('err-code', true);
      document.getElementById('sms-code').classList.add('error'); ok = false;
    }
    if (!ok) return;
    const btn = document.getElementById('btn-sms-login');
    btn.classList.add('loading'); btn.disabled = true;
    setTimeout(() => {
      btn.classList.remove('loading'); btn.disabled = false;
      showToast('登录成功，正在跳转...', 'success');
      setTimeout(() => { window.location.href = 'import.html'; }, 800);
    }, 1000);
  }
  document.getElementById('btn-sms-login').addEventListener('click', handleSmsLogin);
  document.getElementById('sms-code').addEventListener('keydown', e => { if (e.key === 'Enter') handleSmsLogin(); });

  // ─── SSO ───
  document.getElementById('btn-sso').addEventListener('click', () => {
    showToast('正在跳转至企业 SSO 认证...', 'info');
    setTimeout(() => { window.location.href = 'import.html'; }, 1200);
  });
})();
</script>
</body>
</html>
